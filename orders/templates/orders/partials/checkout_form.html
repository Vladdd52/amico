<h2 class="font-display text-xl sm:text-2xl mb-6">Ваши данные</h2>
<form hx-post="{% url 'orders:checkout' %}" hx-target="#checkout-form-container" hx-swap="innerHTML">
  {% csrf_token %}
  
  <div class="mb-6">
    <label class="block text-[10px] sm:text-xs tracking-widest uppercase text-warm-mid font-body mb-1">Имя</label>
    {{ form.name }}
    {% if form.name.errors %}
      <p class="text-red-500 text-xs mt-1">{{ form.name.errors.0 }}</p>
    {% endif %}
  </div>
  
  <div class="mb-10">
    <label class="block text-[10px] sm:text-xs tracking-widest uppercase text-warm-mid font-body mb-1">Телефон</label>
    {{ form.phone }}
    {% if form.phone.errors %}
      <p class="text-red-500 text-xs mt-1">{{ form.phone.errors.0 }}</p>
    {% endif %}
  </div>
  
  <div class="flex flex-col gap-3">
    <button type="submit" name="platform" value="telegram" class="w-full bg-warm-dark text-cream text-[10px] sm:text-xs tracking-widest uppercase font-body py-3.5 sm:py-4 hover:bg-accent transition-colors duration-300 flex items-center justify-center gap-2">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
      Оформить в Telegram
    </button>
    <button type="submit" name="platform" value="instagram" class="w-full border border-warm-dark text-warm-dark text-[10px] sm:text-xs tracking-widest uppercase font-body py-3.5 sm:py-4 hover:bg-warm-dark hover:text-cream transition-all duration-300 flex items-center justify-center gap-2">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>
      Оформить в Instagram
    </button>
  </div>
</form>
