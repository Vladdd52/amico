<div id="instagram-success-modal" class="fixed inset-0 z-[100] flex items-center justify-center transition-all duration-300">
  <!-- Backdrop -->
  <div class="absolute inset-0 bg-warm-dark/60 backdrop-blur-sm" onclick="window.location.href='/cart/'"></div>
  
  <!-- Modal Content -->
  <div class="relative bg-white p-8 sm:p-10 max-w-sm w-full mx-6 shadow-2xl text-center transform scale-95 opacity-0 transition-all duration-300" id="insta-modal-content">
    <div class="w-16 h-16 bg-cream rounded-full flex items-center justify-center mx-auto mb-6 text-warm-dark">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>
    </div>
    
    <h3 class="font-display text-xl mb-4 leading-relaxed">Для оформления заказа мы перенаправим вас в Instagram!</h3>
    
    <p class="font-body text-sm text-warm-mid mb-8 leading-relaxed">
      Мы скопировали детали вашего заказа. Пожалуйста, вставьте их в сообщение в Директ.
    </p>

    <!-- Hidden text to copy -->
    <div class="hidden" id="hidden-order-text">{{ text }}</div>

    <button onclick="copyAndRedirect()" class="w-full bg-warm-dark text-white text-xs tracking-widest uppercase font-body py-4 hover:bg-accent transition-colors flex items-center justify-center gap-2 shadow-lg shadow-warm-dark/10">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/></svg>
      Перейти и вставить
    </button>
    
    <button onclick="window.location.href='/cart/'" class="mt-6 text-[10px] uppercase tracking-widest text-warm-light hover:text-warm-dark transition-colors font-body">
      Закрыть
    </button>
  </div>
</div>

<script>
(function() {
  const modal = document.getElementById('insta-modal-content');
  setTimeout(() => {
    modal.classList.remove('scale-95', 'opacity-0');
    modal.classList.add('scale-100', 'opacity-100');
  }, 10);

  // Auto-copy details
  const text = document.getElementById('hidden-order-text').innerText;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).catch(err => console.log('Auto-copy blocked'));
  }
})();

function copyAndRedirect() {
  const text = document.getElementById('hidden-order-text').innerText;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => {
      window.location.href = "{{ redirect_url }}";
    });
  } else {
    // Fallback if clipboard API is not available
    window.location.href = "{{ redirect_url }}";
  }
}
</script>
