<a href="{% url 'cart:cart_detail' %}" id="cart-icon" class="text-warm-dark hover:text-accent transition-colors duration-200 relative" aria-label="Cart">
  <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
    <path d="M1 1h2.2l1.5 8h9l1.8-5.5H4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="7" cy="15.5" r="1" fill="currentColor"/>
    <circle cx="13" cy="15.5" r="1" fill="currentColor"/>
  </svg>
  {% if cart|length > 0 %}
  <span class="absolute -top-1.5 -right-2 bg-red-700 text-white text-[9px] font-bold w-4 h-4 rounded-full flex items-center justify-center">
    {{ cart|length }}
  </span>
  {% endif %}
</a>
