<!-- OOB swap for gallery thumbnails -->
<div id="gallery-thumbs" hx-swap-oob="true" class="flex flex-col gap-2 overflow-y-auto max-h-[560px] w-20 flex-shrink-0">
  {% for img in product_images %}
  <button
    class="flex-shrink-0 w-16 h-16 lg:w-20 lg:h-20 overflow-hidden border-2 {% if forloop.first %}border-warm-dark{% else %}border-transparent{% endif %} hover:border-warm-mid transition-all duration-200"
    onclick="setMainImage('{{ img.image.url }}', this)"
  >
    <img src="{{ img.image.url }}" alt="" class="w-full h-full object-cover" />
  </button>
  {% endfor %}
</div>

<!-- OOB swap for main image -->
<div id="gallery-main" class="w-full h-full" hx-swap-oob="true" style="min-height: 420px;">
  {% if product_images %}
  <img
    id="main-product-img"
    src="{{ product_images.0.image.url }}"
    alt="{{ object.name }}"
    class="w-full h-full object-cover transition-opacity duration-300"
    style="transition: opacity 0.3s ease;"
  />
  {% elif object.main_image %}
  <img
    id="main-product-img"
    src="{{ object.main_image.url }}"
    alt="{{ object.name }}"
    class="w-full h-full object-cover"
  />
  {% else %}
  <div class="w-full h-full flex items-center justify-center">
    <span class="font-display text-warm-light/40 text-4xl italic">Amico</span>
  </div>
  {% endif %}
</div>

<!-- OOB swap for stock -->
<div id="product-stock" hx-swap-oob="true" class="mb-6">
  {% if selected_variant %}
    {% if selected_variant.stock > 0 %}
    <span class="text-xs text-green-700 font-body tracking-wider">● В наличии ({{ selected_variant.stock }} шт.)</span>
    {% else %}
    <span class="text-xs text-red-500 font-body tracking-wider">● Нет в наличии</span>
    {% endif %}
  {% endif %}
</div>
