{% if products %}
<div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-x-4 gap-y-10">
  {% for product in products %}
  <div class="reveal-on-scroll opacity-0 translate-y-8 transition-all duration-700 ease-out" style="transition-delay: {% cycle '0ms' '100ms' '200ms' '300ms' %};">
    {% include 'main/partials/product_card.html' with product=product %}
  </div>
  {% endfor %}
</div>
{% else %}
<div class="py-24 text-center">
  <p class="font-display text-2xl font-light text-warm-mid italic mb-2">Ничего не найдено</p>
  <p class="text-xs text-warm-light font-body tracking-wider">Попробуйте изменить параметры фильтрации</p>
</div>
{% endif %}
